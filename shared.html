<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Tribal AI — Shared Chat</title><link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"><script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script><style>:root{--bg:#0f0e0b;--bg2:#1a1916;--bg3:#242320;--surface:#1e1d1a;--border:#2e2d29;--ink:#f9f8f6;--ink2:#d6d5d0;--ink3:#a8a49d;--ink4:#706d66;--accent:#c84b09;--r:12px}*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--ink);font-family:'Geist',sans-serif;min-height:100vh;display:flex;flex-direction:column}nav{height:56px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 6%;gap:12px}.brand{display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--ink);font-weight:700;font-size:.88rem}.mark{width:28px;height:28px;border-radius:6px;background:var(--accent);display:grid;place-items:center;color:#fff;font-family:'Instrument Serif',serif;font-size:.8rem}.watermark{margin-left:auto;font-size:.78rem;color:var(--ink4)}.chat-area{flex:1;overflow-y:auto;padding:24px 20px;max-width:700px;width:100%;margin:0 auto;display:flex;flex-direction:column;gap:20px}.msg{display:flex;gap:10px}.msg-user{justify-content:flex-end}.avatar{width:28px;height:28px;border-radius:6px;display:grid;place-items:center;font-size:.65rem;font-weight:700;flex-shrink:0}.msg-user .avatar{background:var(--accent);color:#fff}.msg-ai .avatar{background:var(--bg3);color:var(--ink2);border:1px solid var(--border)}.content{max-width:85%;font-size:.88rem;line-height:1.65;color:var(--ink2)}.msg-user .content{background:var(--bg3);border:1px solid var(--border);border-radius:14px 14px 4px 14px;padding:10px 14px}.msg-ai .content{color:var(--ink)}.content p{margin-bottom:6px}pre{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;overflow-x:auto;margin:10px 0;font-family:'JetBrains Mono',monospace;font-size:.8rem}pre code{background:transparent;padding:0}code{font-family:'JetBrains Mono',monospace;font-size:.84em;background:var(--bg3);padding:2px 5px;border-radius:4px}.empty{text-align:center;padding:60px 20px;color:var(--ink4)}.cta{max-width:700px;margin:0 auto;padding:20px;text-align:center}footer{border-top:1px solid var(--border);padding:18px 6%;background:var(--bg2);color:var(--ink4);font-size:.74rem;text-align:center}</style></head><body><nav><a class="brand" href="/"><span class="mark">T</span><span>Tribal AI</span></a><span class="watermark">Shared Conversation</span></nav><div class="chat-area" id="chat"><div class="empty" id="loading">Loading shared chat...</div></div><div class="cta"><a href="/" style="display:inline-block;padding:10px 24px;background:var(--accent);color:#fff;border-radius:var(--r);font-weight:700;font-size:.88rem;text-decoration:none">Try Tribal AI Free →</a></div><footer>© 2026 Tribal AI · Built by Obasanjo Samuel · Tribal Tech</footer><script>marked.setOptions({highlight:(c,l)=>l&&hljs.getLanguage(l)?hljs.highlight(c,{language:l}).value:hljs.highlightAuto(c).value,breaks:true,gfm:true});const id=window.location.pathname.split('/').pop();if(!id||id==='shared.html'){document.getElementById('loading').textContent='No chat ID provided';}else{fetch(`/api/shared/${id}`).then(r=>{if(!r.ok)throw new Error();return r.json()}).then(data=>{document.title=data.title+' — Tribal AI';const el=document.getElementById('chat');el.innerHTML=data.messages.map(m=>`<div class="msg msg-${m.role==='user'?'user':'ai'}"><div class="avatar">${m.role==='user'?'Y':'T'}</div><div class="content">${m.role==='assistant'?marked.parse(m.content):m.content.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}</div></div>`).join('')}).catch(()=>{document.getElementById('loading').textContent='Chat not found or expired.'})}</script></body></html>
