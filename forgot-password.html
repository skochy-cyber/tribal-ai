<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Tribal AI — Reset Password</title><link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet"><style>:root{--bg:#0f0e0b;--bg2:#1a1916;--bg3:#242320;--surface:#1e1d1a;--border:#2e2d29;--ink:#f9f8f6;--ink2:#d6d5d0;--ink3:#a8a49d;--ink4:#706d66;--accent:#c84b09;--r:12px}*{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;background:var(--bg);color:var(--ink);font-family:'Geist',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}.card{width:100%;max-width:400px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:32px}.brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--ink);font-weight:700;font-size:1rem;margin-bottom:24px;justify-content:center}.mark{width:32px;height:32px;border-radius:8px;background:var(--accent);display:grid;place-items:center;color:#fff;font-family:'Instrument Serif',serif}h1{font-family:'Instrument Serif',serif;font-size:1.6rem;text-align:center;margin-bottom:8px}.sub{text-align:center;color:var(--ink3);font-size:.88rem;margin-bottom:24px}.fg{margin-bottom:16px}label{display:block;font-size:.78rem;font-weight:600;margin-bottom:6px;color:var(--ink3)}.fi{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--r);background:var(--bg3);color:var(--ink);font:inherit;font-size:.9rem;outline:none}.fi:focus{border-color:var(--accent)}.btn{width:100%;padding:12px;border:none;border-radius:var(--r);background:var(--accent);color:#fff;font:inherit;font-weight:700;font-size:.9rem;cursor:pointer;transition:.15s}.btn:hover{background:#e85f1a}.btn:disabled{opacity:.5;cursor:not-allowed}.link{text-align:center;margin-top:16px;font-size:.84rem}.link a{color:var(--accent);text-decoration:none}.ok{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2);color:#22c55e;padding:12px;border-radius:var(--r);text-align:center;display:none;margin-bottom:16px;font-size:.88rem}</style></head><body><div class="card"><a class="brand" href="/"><span class="mark">T</span><span>Tribal AI</span></a><div id="step1"><h1>Reset Password</h1><p class="sub">Enter your email and we'll send a reset link.</p><div class="ok" id="okMsg">✅ If that email exists, a reset link has been sent.</div><div class="fg"><label>Email</label><input class="fi" id="email" type="email" placeholder="you@example.com" required></div><button class="btn" id="sendBtn" onclick="sendReset()">Send Reset Link</button></div><div id="step2" style="display:none"><h1>New Password</h1><p class="sub">Enter your new password below.</p><div class="fg"><label>New Password</label><input class="fi" id="newPass" type="password" placeholder="Min 6 characters" required></div><div class="fg"><label>Confirm Password</label><input class="fi" id="confirmPass" type="password" placeholder="Repeat password" required></div><button class="btn" onclick="resetPassword()">Reset Password</button></div><div class="link">Remember your password? <a href="login.html">Log in</a></div></div><script>const params=new URLSearchParams(window.location.search);const resetToken=params.get('token');if(resetToken){document.getElementById('step1').style.display='none';document.getElementById('step2').style.display='block';}async function sendReset(){const email=document.getElementById('email').value;if(!email)return;const btn=document.getElementById('sendBtn');btn.disabled=true;btn.textContent='Sending...';try{await fetch('/api/auth/forgot-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})});document.getElementById('okMsg').style.display='block';}catch{}finally{btn.disabled=false;btn.textContent='Send Reset Link';}}async function resetPassword(){const password=document.getElementById('newPass').value;const confirm=document.getElementById('confirmPass').value;if(password!==confirm){alert('Passwords do not match');return;}if(password.length<6){alert('Password must be at least 6 characters');return;}try{const r=await fetch('/api/auth/reset-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:resetToken,password})});if(r.ok){alert('Password reset! You can now log in.');window.location='login.html';}else{const d=await r.json();alert(d.error||'Reset failed');}}catch{alert('Network error');}}</script></body></html>
