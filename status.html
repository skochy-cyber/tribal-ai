<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Tribal AI — Status</title><link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet"><style>:root{--bg:#0f0e0b;--bg2:#1a1916;--bg3:#242320;--surface:#1e1d1a;--border:#2e2d29;--ink:#f9f8f6;--ink2:#d6d5d0;--ink3:#a8a49d;--ink4:#706d66;--accent:#c84b09;--green:#22c55e;--r:12px}*{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;background:var(--bg);color:var(--ink);font-family:'Geist',sans-serif}nav{height:64px;display:flex;align-items:center;padding:0 6%;background:rgba(15,14,11,.92);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}.brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--ink);font-weight:700}.mark{width:32px;height:32px;border-radius:8px;background:var(--accent);display:grid;place-items:center;color:#fff;font-family:'Instrument Serif',serif}.nav-links{margin-left:auto;display:flex;gap:8px}.nav-links a{font-size:.82rem;color:var(--ink3);text-decoration:none;padding:.42rem .9rem;border-radius:10px}.nav-links a:hover{background:var(--bg3);color:var(--ink)}main{max-width:680px;margin:0 auto;padding:60px 24px 80px}h1{font-family:'Instrument Serif',serif;font-size:2rem;font-weight:400;margin-bottom:24px}.status-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:12px;display:flex;align-items:center;gap:12px}.status-dot{width:10px;height:10px;border-radius:50%}.dot-green{background:var(--green);box-shadow:0 0 8px rgba(34,197,94,.4)}.dot-yellow{background:#f59e0b}.dot-red{background:#ef4444}.status-info{flex:1}.status-info h3{font-size:.92rem;font-weight:600}.status-info p{font-size:.82rem;color:var(--ink3)}.status-label{font-size:.76rem;font-weight:600;padding:4px 10px;border-radius:20px}.label-ok{background:rgba(34,197,94,.1);color:var(--green)}.label-warn{background:rgba(245,158,11,.1);color:#f59e0b}.label-err{background:rgba(239,68,68,.1);color:#ef4444}footer{border-top:1px solid var(--border);padding:18px 6%;background:var(--bg2);color:var(--ink4);font-size:.74rem;text-align:center}</style></head><body><nav><a class="brand" href="/"><span class="mark">T</span><span>Tribal AI</span></a><div class="nav-links"><a href="/">Home</a><a href="pricing.html">Pricing</a></div></nav><main><h1>System Status</h1><div id="statusList"><div style="text-align:center;color:var(--ink4);padding:40px">Loading...</div></div><p style="font-size:.82rem;color:var(--ink4);margin-top:24px;text-align:center">Last checked: <span id="lastCheck">—</span></p></main><footer>© 2026 Tribal AI · Built by Obasanjo Samuel · Tribal Tech</footer><script>async function checkStatus(){try{const r=await fetch('/api/status');const d=await r.json();const el=document.getElementById('statusList');const services=Object.entries(d.services||{});el.innerHTML=services.map(([name,status])=>`<div class="status-card"><div class="status-dot ${status==='operational'?'dot-green':status==='demo-mode'?'dot-yellow':'dot-red'}"></div><div class="status-info"><h3>${name.charAt(0).toUpperCase()+name.slice(1)}</h3><p>${status}</p></div><span class="status-label ${status==='operational'?'label-ok':status==='demo-mode'?'label-warn':'label-err'}">${status}</span></div>`).join('');document.getElementById('lastCheck').textContent=new Date().toLocaleString();}catch{document.getElementById('statusList').innerHTML='<div style="text-align:center;color:var(--ink4);padding:40px">Failed to check status</div>';}}checkStatus();setInterval(checkStatus,30000);</script></body></html>
