<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#0f0e0b">
<title>Tribal AI — Templates</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0e0b;--bg2:#1a1916;--bg3:#242320;--surface:#1e1d1a;--border:#2e2d29;--border2:#3d3c37;--ink:#f9f8f6;--ink2:#d6d5d0;--ink3:#a8a49d;--ink4:#706d66;--accent:#c84b09;--accent2:#e85f1a;--accent-bg:rgba(200,75,9,.1);--green:#22c55e;--green-bg:rgba(34,197,94,.1);--r:12px;--shadow:0 4px 20px rgba(0,0,0,.3)}
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:var(--bg);color:var(--ink);font-family:'Geist',sans-serif;-webkit-font-smoothing:antialiased}
body::before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
nav{height:64px;display:flex;align-items:center;padding:0 6%;background:rgba(15,14,11,.92);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--ink);font-weight:700;font-size:.95rem}
.mark{width:32px;height:32px;border-radius:8px;background:var(--accent);display:grid;place-items:center;color:#fff;font-family:'Instrument Serif',serif;font-size:.9rem}
.nav-links{margin-left:auto;display:flex;gap:8px;align-items:center}
.nav-links a{font-size:.82rem;color:var(--ink3);text-decoration:none;font-weight:500;padding:.42rem .9rem;border-radius:10px;transition:.15s}
.nav-links a:hover{background:var(--bg3);color:var(--ink)}
.btn-nav{background:var(--accent)!important;color:#fff!important;padding:.42rem 1rem!important}
.btn-nav:hover{background:var(--accent2)!important}

.page{padding:60px 6% 80px;max-width:1100px;margin:0 auto}
.page-header{text-align:center;margin-bottom:48px}
.page-header h1{font-family:'Instrument Serif',serif;font-size:clamp(2rem,4vw,2.8rem);font-weight:400;margin-bottom:12px}
.page-header h1 em{color:var(--accent);font-style:italic}
.page-header p{color:var(--ink3);font-size:.95rem;max-width:480px;margin:0 auto;line-height:1.6}

.search-bar{max-width:480px;margin:0 auto 40px;position:relative}
.search-bar input{width:100%;padding:12px 16px 12px 44px;border:1.5px solid var(--border);border-radius:var(--r);background:var(--surface);color:var(--ink);font:inherit;font-size:.9rem;outline:none;transition:.15s}
.search-bar input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg)}
.search-bar input::placeholder{color:var(--ink4)}
.search-bar svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--ink4)}

.categories{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:40px}
.cat-btn{padding:8px 18px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--ink3);font:inherit;font-size:.82rem;cursor:pointer;transition:.15s}
.cat-btn:hover{border-color:var(--ink4);color:var(--ink2)}
.cat-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;transition:.2s;cursor:pointer}
.card:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:var(--border2)}
.card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.card-icon{width:40px;height:40px;border-radius:10px;display:grid;place-items:center;font-size:1.2rem;flex-shrink:0}
.card-cat{font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;padding:3px 10px;border-radius:12px;background:var(--accent-bg);color:var(--accent)}
.card h3{font-size:1rem;font-weight:600;margin-bottom:6px}
.card p{font-size:.82rem;color:var(--ink3);line-height:1.5;margin-bottom:16px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card-footer{display:flex;align-items:center;justify-content:space-between}
.card-footer .uses{font-size:.72rem;color:var(--ink4)}
.use-btn{padding:8px 16px;border-radius:var(--r);background:var(--accent);color:#fff;border:none;font:inherit;font-size:.82rem;font-weight:600;cursor:pointer;transition:.15s}
.use-btn:hover{background:var(--accent2);transform:translateY(-1px)}

.empty{text-align:center;padding:60px 20px;color:var(--ink4)}
.empty h3{font-size:1.1rem;margin-bottom:8px;color:var(--ink3)}

footer{border-top:1px solid var(--border);padding:18px 6%;background:var(--bg2);color:var(--ink4);font-size:.74rem;text-align:center}
@media(max-width:768px){.grid{grid-template-columns:1fr}.page{padding:40px 6% 60px}}
</style>
</head>
<body>
<nav>
  <a class="brand" href="/"><span class="mark">T</span><span>Tribal AI</span></a>
  <div class="nav-links">
    <a href="/">Chat</a>
    <a href="login.html">Sign in</a>
    <a class="btn-nav" href="signup.html">Get Started</a>
  </div>
</nav>

<section class="page">
  <div class="page-header">
    <h1>Prompt <em>Templates</em></h1>
    <p>Ready-made prompts to get you started. Pick one, customize it, and let AI do the work.</p>
  </div>

  <div class="search-bar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="searchInput" placeholder="Search templates..." oninput="filterTemplates()">
  </div>

  <div class="categories" id="categories"></div>
  <div class="grid" id="templateGrid"></div>
  <div class="empty" id="emptyState" style="display:none"><h3>No templates found</h3><p>Try a different search or category.</p></div>
</section>

<footer>© 2026 Tribal AI · Built by Obasanjo Samuel · Tribal Tech</footer>

<script>
const templates = [
  {title:"Write Python Code",desc:"Generate clean, well-documented Python functions with type hints and docstrings.",category:"Coding",icon:"→",color:"var(--accent-bg)",uses:1240},
  {title:"Debug JavaScript",desc:"Find and fix bugs in JavaScript code with detailed explanations.",category:"Coding",icon:"<svg width="16" height="16" style="display:inline-block;vertical-align:middle"><use href="#icon-alert"/></svg>",color:"rgba(239,68,68,.1)",uses:890},
  {title:"Explain Any Concept",desc:"Break down complex topics into simple, easy-to-understand language.",category:"Learning",icon:"<svg width="16" height="16" style="display:inline-block;vertical-align:middle"><use href="#icon-zap"/></svg>",color:"rgba(59,130,246,.1)",uses:2100},
  {title:"Write Professional Email",desc:"Craft clear, professional emails for any business situation.",category:"Writing",icon:"<svg width="16" height="16" style="display:inline-block;vertical-align:middle"><use href="#icon-mail"/></svg>",color:"rgba(34,197,94,.1)",uses:1560},
  {title:"Create Business Plan",desc:"Generate a comprehensive business plan with market analysis.",category:"Business",icon:"→",color:"rgba(168,85,247,.1)",uses:730},
  {title:"SEO Blog Post",desc:"Write an optimized blog post with proper keywords and structure.",category:"Marketing",icon:"<svg width="16" height="16" style="display:inline-block;vertical-align:middle"><use href="#icon-edit"/></svg>",color:"rgba(245,158,11,.1)",uses:1890},
  {title:"Data Analysis",desc:"Analyze datasets, find patterns, and generate visualizations.",category:"Data",icon:"<svg width="16" height="16" style="display:inline-block;vertical-align:middle"><use href="#icon-chart"/></svg>",color:"rgba(236,72,153,.1)",uses:650},
  {title:"UI/UX Design Review",desc:"Get feedback on your design with actionable improvement suggestions.",category:"Design",icon:"<svg width="16" height="16" style="display:inline-block;vertical-align:middle"><use href="#icon-palette"/></svg>",color:"rgba(6,182,212,.1)",uses:420},
  {title:"Resume Builder",desc:"Create a compelling resume tailored to your target role.",category:"Career",icon:"<svg width="16" height="16" style="display:inline-block;vertical-align:middle"><use href="#icon-copy"/></svg>",color:"rgba(34,197,94,.1)",uses:3200},
  {title:"Translate Text",desc:"Translate between languages with natural, fluent output.",category:"Writing",icon:"<svg width="16" height="16" style="display:inline-block;vertical-align:middle"><use href="#icon-globe"/></svg>",color:"rgba(59,130,246,.1)",uses:1100},
  {title:"Recipe Generator",desc:"Generate recipes from available ingredients with step-by-step instructions.",category:"Life",icon:"🍳",color:"rgba(245,158,11,.1)",uses:540},
  {title:"SQL Query Builder",desc:"Write complex SQL queries with explanations and optimizations.",category:"Coding",icon:"🗄️",color:"rgba(168,85,247,.1)",uses:780},
];

const cats = ["All",...[...new Set(templates.map(t=>t.category))]];
let activeCat = "All";

function renderCategories(){
  document.getElementById('categories').innerHTML = cats.map(c=>`<button class="cat-btn ${c===activeCat?'active':''}" onclick="setCat('${c}')">${c}</button>`).join('');
}

function setCat(c){activeCat=c;renderCategories();filterTemplates();}

function filterTemplates(){
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = templates.filter(t=>{
    const matchCat = activeCat==="All"||t.category===activeCat;
    const matchQ = t.title.toLowerCase().includes(q)||t.desc.toLowerCase().includes(q);
    return matchCat&&matchQ;
  });
  const grid = document.getElementById('templateGrid');
  const empty = document.getElementById('emptyState');
  if(!filtered.length){grid.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  grid.innerHTML = filtered.map(t=>`
    <div class="card">
      <div class="card-header">
        <div class="card-icon" style="background:${t.color}">${t.icon}</div>
        <span class="card-cat">${t.category}</span>
      </div>
      <h3>${t.title}</h3>
      <p>${t.desc}</p>
      <div class="card-footer">
        <span class="uses">${t.uses.toLocaleString()} uses</span>
        <button class="use-btn" onclick="useTemplate('${t.title.replace(/'/g,"\\'")}')">Use Template</button>
      </div>
    </div>
  `).join('');
}

function useTemplate(title){
  const t = templates.find(x=>x.title===title);
  if(t){
    const msg = encodeURIComponent(`Template: ${t.title}\n${t.desc}`);
    window.location.href = `/?template=${msg}`;
  }
}

renderCategories();
filterTemplates();
</script>
</body>
</html>
