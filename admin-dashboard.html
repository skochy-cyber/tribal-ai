<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Tribal AI — Admin Dashboard</title><link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet"><style>:root{--bg:#0f0e0b;--bg2:#1a1916;--bg3:#242320;--surface:#1e1d1a;--border:#2e2d29;--ink:#f9f8f6;--ink2:#d6d5d0;--ink3:#a8a49d;--ink4:#706d66;--accent:#c84b09;--green:#22c55e;--red:#ef4444;--r:12px}*{box-sizing:border-box;margin:0;padding:0}body{display:flex;min-height:100vh;background:var(--bg);color:var(--ink);font-family:'Geist',sans-serif}.sidebar{width:240px;background:var(--bg2);border-right:1px solid var(--border);padding:20px 0;display:flex;flex-direction:column;position:fixed;height:100vh}.sidebar-brand{padding:0 20px 20px;display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--ink);font-weight:700;border-bottom:1px solid var(--border)}.mark{width:32px;height:32px;border-radius:8px;background:var(--accent);display:grid;place-items:center;color:#fff;font-family:'Instrument Serif',serif}.sidebar-nav{flex:1;padding:12px 8px}.sidebar-nav a{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r);color:var(--ink3);text-decoration:none;font-size:.88rem;margin-bottom:2px;transition:.15s}.sidebar-nav a:hover{background:var(--bg3);color:var(--ink)}.sidebar-nav a.active{background:var(--accent);color:#fff}.sidebar-nav a svg{width:18px;height:18px;flex-shrink:0}.main{margin-left:240px;flex:1;padding:32px}.header{margin-bottom:24px}.header h1{font-family:'Instrument Serif',serif;font-size:1.8rem;font-weight:400}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;text-align:center}.stat h2{font-size:2rem;font-weight:700;color:var(--accent)}.stat p{font-size:.82rem;color:var(--ink4);margin-top:4px}.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:16px}.card h3{font-size:1rem;margin-bottom:12px}.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}.empty{text-align:center;padding:20px;color:var(--ink4);font-size:.84rem}.btn{padding:8px 16px;border-radius:var(--r);border:none;font:inherit;font-weight:600;font-size:.84rem;cursor:pointer}.btn-accent{background:var(--accent);color:#fff}</style></head><body><aside class="sidebar"><a class="sidebar-brand" href="admin-dashboard.html"><span class="mark">T</span><span>Tribal AI Admin</span></a><nav class="sidebar-nav"><a href="admin-dashboard.html" class="active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</a><a href="admin-users.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Users</a><a href="admin-chats.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Chats</a><a href="admin-payments.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>Payments</a><a href="admin-models.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v6m0 6v6"/></svg>Models</a><a href="admin-analytics.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Analytics</a><a href="admin-settings.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Settings</a><a href="admin-backups.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/></svg>Backups</a><a href="admin-logs.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Audit Logs</a><a href="admin-login.html" style="margin-top:auto"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Logout</a></nav></aside><div class="main"><div class="header"><h1>Admin Dashboard</h1></div><div class="stats"><div class="stat"><h2 id="totalUsers">—</h2><p>Users</p></div><div class="stat"><h2 id="totalChats">—</h2><p>Chats</p></div><div class="stat"><h2 id="totalPayments">—</h2><p>Payments</p></div><div class="stat"><h2 id="totalRevenue">—</h2><p>Revenue</p></div></div><div class="grid-2"><div class="card"><h3>Quick Actions</h3><div style="display:flex;flex-wrap:wrap;gap:8px"><a href="admin-users.html" class="btn btn-accent" style="text-decoration:none">Manage Users</a><a href="admin-chats.html" class="btn btn-accent" style="text-decoration:none">Manage Chats</a><a href="admin-payments.html" class="btn btn-accent" style="text-decoration:none">Payments</a><a href="admin-analytics.html" class="btn btn-accent" style="text-decoration:none">Analytics</a><a href="admin-settings.html" class="btn btn-accent" style="text-decoration:none">Settings</a></div></div><div class="card"><h3>Recent Activity</h3><div id="recentLogs"><div class="empty">Loading...</div></div></div></div><div class="card"><h3>Revenue Overview</h3><div id="revenueChart"><div class="empty">Loading...</div></div></div></div><script>const API='';const t=localStorage.getItem('ta_admin_token');if(!t)window.location='admin-login.html';async function loadDashboard(){try{const[statsRev,revenueRev]=await Promise.all([fetch(API+'/api/admin/stats',{headers:{'Authorization':'Bearer '+t}}),fetch(API+'/api/admin/revenue',{headers:{'Authorization':'Bearer '+t}})]);const s=await statsRev.json();const rev=await revenueRev.json();document.getElementById('totalUsers').textContent=s.totalUsers||0;document.getElementById('totalChats').textContent=s.totalChats||s.totalLogs||0;document.getElementById('totalPayments').textContent=s.totalPayments||0;const totalRev=(rev.revenue||[]).reduce((a,r)=>a+r.total,0);document.getElementById('totalRevenue').textContent='₦'+totalRev.toLocaleString();const logs=s.recentLogs||[];const el=document.getElementById('recentLogs');if(logs.length){el.innerHTML=logs.slice(0,10).map(l=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:.82rem"><span>${l.action||'activity'}</span><span style="color:var(--ink4)">${new Date(l.createdAt).toLocaleString()}</span></div>`).join('')}else{el.innerHTML='<div class="empty">No activity yet</div>'}const rc=document.getElementById('revenueChart');const rd=rev.revenue||[];if(rd.length){const max=Math.max(...rd.map(r=>r.total));rc.innerHTML=rd.slice(-7).map(r=>{const pct=max>0?(r.total/max*100):0;return`<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px"><span style="width:80px;font-size:.78rem;color:var(--ink4);text-align:right">${r._id}</span><div style="flex:1;height:20px;background:var(--bg3);border-radius:4px;overflow:hidden"><div style="height:100%;background:var(--accent);width:${pct}%;border-radius:4px"></div></div><span style="font-size:.78rem;color:var(--ink3);width:60px">₦${r.total.toLocaleString()}</span></div>`}).join('')}else{rc.innerHTML='<div class="empty">No revenue data yet</div>'}}catch(e){}}loadDashboard();</script></body></html>
