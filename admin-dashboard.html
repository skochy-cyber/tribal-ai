<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#0f0e0b">
<title>Tribal AI — Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0e0b;--bg2:#1a1916;--bg3:#242320;--surface:#1e1d1a;--border:#2e2d29;--border2:#3d3c37;--ink:#f9f8f6;--ink2:#d6d5d0;--ink3:#a8a49d;--ink4:#706d66;--accent:#c84b09;--accent2:#e85f1a;--accent-bg:rgba(200,75,9,.1);--green:#22c55e;--green-bg:rgba(34,197,94,.1);--blue:#3b82f6;--blue-bg:rgba(59,130,246,.1);--red:#ef4444;--r:12px}
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:var(--bg);color:var(--ink);font-family:'Geist',sans-serif;-webkit-font-smoothing:antialiased}

.topbar{height:64px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 6%;gap:16px;position:sticky;top:0;z-index:10}
.topbar .brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--ink);font-weight:700;font-size:.95rem}
.topbar .mark{width:32px;height:32px;border-radius:8px;background:var(--red);display:grid;place-items:center;color:#fff;font-family:'Instrument Serif',serif;font-size:.9rem}
.tabs{display:flex;gap:4px;margin-left:32px}
.tab{padding:8px 16px;border-radius:8px;font-size:.82rem;font-weight:600;color:var(--ink3);cursor:pointer;transition:.15s;border:none;background:transparent}
.tab:hover{background:var(--bg3);color:var(--ink2)}
.tab.active{background:var(--bg3);color:var(--ink)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.topbar-right .badge{font-size:.72rem;background:var(--accent-bg);color:var(--accent);padding:4px 10px;border-radius:12px;font-weight:600}
.btn-sm{padding:6px 14px;border-radius:8px;font:inherit;font-size:.78rem;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--ink3);transition:.15s}
.btn-sm:hover{background:var(--bg3);color:var(--ink)}
.btn-danger{border-color:rgba(239,68,68,.3);color:var(--red)}
.btn-danger:hover{background:rgba(239,68,68,.1)}

main{padding:32px 6%;max-width:1200px;margin:0 auto}
.page{display:none}.page.active{display:block}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:32px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px}
.stat-card .label{font-size:.76rem;color:var(--ink4);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.stat-card .value{font-family:'Instrument Serif',serif;font-size:2rem;color:var(--ink)}
.stat-card .sub{font-size:.78rem;color:var(--ink4);margin-top:4px}

/* Tables */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:24px}
.table-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.table-header h3{font-size:.92rem;font-weight:700}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:12px 20px;font-size:.76rem;font-weight:600;color:var(--ink4);text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border);background:var(--bg3)}
td{padding:12px 20px;font-size:.84rem;color:var(--ink2);border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:600}
.badge-free{background:var(--bg3);color:var(--ink3)}
.badge-pro{background:var(--accent-bg);color:var(--accent)}
.badge-admin{background:rgba(239,68,68,.1);color:var(--red)}
.empty{text-align:center;padding:48px 20px;color:var(--ink4);font-size:.88rem}

/* Toast */
.toast-wrap{position:fixed;top:80px;right:24px;z-index:100}
.toast{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 20px;font-size:.84rem;color:var(--ink2);box-shadow:0 8px 32px rgba(0,0,0,.4);animation:slideIn .3s ease}
.toast.ok{border-color:rgba(34,197,94,.3)}
.toast.err{border-color:rgba(239,68,68,.3);color:var(--red)}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;z-index:200}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:32px;width:100%;max-width:400px}
.modal h3{font-size:1.1rem;margin-bottom:8px}
.modal p{font-size:.88rem;color:var(--ink3);margin-bottom:20px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end}
.modal-actions .btn-sm{padding:8px 20px}
.modal-actions .btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.modal-actions .btn-primary:hover{background:var(--accent2)}

@media(max-width:768px){.tabs{margin-left:8px;overflow-x:auto}main{padding:20px 16px}.stats{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<div class="topbar">
  <a class="brand" href="/"><span class="mark">A</span><span>Admin</span></a>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('overview')">Overview</button>
    <button class="tab" onclick="switchTab('users')">Users</button>
    <button class="tab" onclick="switchTab('logs')">Logs</button>
  </div>
  <div class="topbar-right">
    <span class="badge">Admin</span>
    <button class="btn-sm" onclick="logout()">Sign out</button>
  </div>
</div>

<main>
  <!-- OVERVIEW -->
  <div class="page active" id="page-overview">
    <div class="stats">
      <div class="stat-card"><div class="label">Total Users</div><div class="value" id="stat-users">—</div></div>
      <div class="stat-card"><div class="label">Total Messages</div><div class="value" id="stat-logs">—</div></div>
      <div class="stat-card"><div class="label">Pro Users</div><div class="value" id="stat-pro">—</div></div>
      <div class="stat-card"><div class="label">System Status</div><div class="value" style="color:var(--green)">Online</div></div>
    </div>
    <div class="table-wrap">
      <div class="table-header"><h3>Recent Activity</h3></div>
      <table>
        <thead><tr><th>User</th><th>Model</th><th>Tokens</th><th>Time</th></tr></thead>
        <tbody id="logsTable"><tr><td colspan="4" class="empty">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- USERS -->
  <div class="page" id="page-users">
    <div class="table-wrap">
      <div class="table-header">
        <h3>All Users</h3>
      </div>
      <table>
        <thead><tr><th>Name</th><th>Email</th><th>Plan</th><th>Messages</th><th>Joined</th><th>Actions</th></tr></thead>
        <tbody id="usersTable"><tr><td colspan="6" class="empty">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- LOGS -->
  <div class="page" id="page-logs">
    <div class="table-wrap">
      <div class="table-header"><h3>Chat Logs</h3></div>
      <table>
        <thead><tr><th>User</th><th>Model</th><th>Tokens</th><th>Type</th><th>Time</th></tr></thead>
        <tbody id="logsFullTable"><tr><td colspan="5" class="empty">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>
</main>

<div class="toast-wrap" id="toasts"></div>

<!-- CONFIRM MODAL -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <h3 id="modal-title">Confirm</h3>
    <p id="modal-body">Are you sure?</p>
    <div class="modal-actions">
      <button class="btn-sm" onclick="closeModal()">Cancel</button>
      <button class="btn-sm btn-primary" id="modal-confirm">Confirm</button>
    </div>
  </div>
</div>

<script>
const token = localStorage.getItem('ta_admin_token');
if (!token) window.location.href = 'admin-login.html';

async function api(url, opts = {}) {
  const res = await fetch(url, {
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token, ...(opts.headers || {}) },
    ...opts,
  });
  if (res.status === 401 || res.status === 403) { logout(); return null; }
  if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error || 'Request failed'); }
  return res.json();
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('page-' + name).classList.add('active');
  if (name === 'users') loadUsers();
  if (name === 'logs') loadLogs();
}

async function loadAll() {
  try {
    const d = await api('/api/admin/stats');
    if (!d) return;
    document.getElementById('stat-users').textContent = d.totalUsers ?? '—';
    document.getElementById('stat-logs').textContent = d.totalLogs ?? '—';
    const proUsers = d.recentLogs?.length || 0;
    document.getElementById('stat-pro').textContent = '—';
    if (d.recentLogs?.length) {
      document.getElementById('logsTable').innerHTML = d.recentLogs.slice(0, 10).map(l =>
        `<tr><td>${esc(l.userEmail || '—')}</td><td><code style="font-size:.76rem;background:var(--bg3);padding:2px 8px;border-radius:4px">${esc(l.model || '—')}</code></td><td>${l.tokens || 0}</td><td style="color:var(--ink4)">${fmtDate(l.createdAt)}</td></tr>`
      ).join('');
    } else {
      document.getElementById('logsTable').innerHTML = '<tr><td colspan="4" class="empty">No activity yet</td></tr>';
    }
  } catch { toast('Failed to load stats', 'err'); }
}

async function loadUsers() {
  const tbody = document.getElementById('usersTable');
  tbody.innerHTML = '<tr><td colspan="6" class="empty">Loading...</td></tr>';
  try {
    const d = await api('/api/admin/users');
    if (!d) return;
    const users = d.users || [];
    if (!users.length) { tbody.innerHTML = '<tr><td colspan="6" class="empty">No users yet</td></tr>'; return; }
    tbody.innerHTML = users.map(u => `
      <tr>
        <td style="font-weight:600">${esc(u.name || '—')}</td>
        <td style="color:var(--ink3)">${esc(u.email)}</td>
        <td><span class="badge badge-${u.plan || 'free'}">${u.plan || 'free'}</span></td>
        <td>${u.totalMessages || 0}</td>
        <td style="color:var(--ink4)">${fmtDate(u.createdAt)}</td>
        <td>
          <button class="btn-sm" onclick="togglePlan('${u._id || u.id}','${u.plan}')">${u.plan === 'pro' ? 'Downgrade' : 'Upgrade to Pro'}</button>
        </td>
      </tr>`).join('');
  } catch (e) { tbody.innerHTML = `<tr><td colspan="6" class="empty">${e.message}</td></tr>`; }
}

async function loadLogs() {
  const tbody = document.getElementById('logsFullTable');
  tbody.innerHTML = '<tr><td colspan="5" class="empty">Loading...</td></tr>';
  try {
    const d = await api('/api/admin/stats');
    if (!d) return;
    const logs = d.recentLogs || [];
    if (!logs.length) { tbody.innerHTML = '<tr><td colspan="5" class="empty">No logs yet</td></tr>'; return; }
    tbody.innerHTML = logs.map(l => `
      <tr>
        <td>${esc(l.userEmail || '—')}</td>
        <td><code style="font-size:.76rem;background:var(--bg3);padding:2px 8px;border-radius:4px">${esc(l.model || '—')}</code></td>
        <td>${l.tokens || 0}</td>
        <td>${esc(l.type || 'chat')}</td>
        <td style="color:var(--ink4)">${fmtDate(l.createdAt)}</td>
      </tr>`).join('');
  } catch (e) { tbody.innerHTML = `<tr><td colspan="5" class="empty">${e.message}</td></tr>`; }
}

function togglePlan(id, currentPlan) {
  const newPlan = currentPlan === 'pro' ? 'free' : 'pro';
  document.getElementById('modal-title').textContent = `Upgrade to Pro?`;
  document.getElementById('modal-body').textContent = `Change this user's plan to ${newPlan}?`;
  document.getElementById('modal-confirm').onclick = async () => {
    closeModal();
    try {
      await api(`/api/admin/users/${id}/plan`, { method: 'PUT', body: JSON.stringify({ plan: newPlan }) });
      toast(`User plan updated to ${newPlan}`, 'ok');
      loadUsers();
    } catch (e) { toast('Failed: ' + e.message, 'err'); }
  };
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
document.getElementById('modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

function logout() {
  localStorage.removeItem('ta_admin_token');
  window.location.href = 'admin-login.html';
}
function esc(t) { return String(t || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleString('en-GB', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
}
function toast(msg, type = 'ok') {
  const wrap = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .3s'; setTimeout(() => el.remove(), 300); }, 3000);
}

document.addEventListener('DOMContentLoaded', loadAll);
</script>
</body>
</html>
