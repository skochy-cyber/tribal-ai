<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Tribal AI — Models</title><link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet"><style>:root{--bg:#0f0e0b;--bg2:#1a1916;--bg3:#242320;--surface:#1e1d1a;--border:#2e2d29;--ink:#f9f8f6;--ink2:#d6d5d0;--ink3:#a8a49d;--ink4:#706d66;--accent:#c84b09;--green:#22c55e;--red:#ef4444;--r:12px}*{box-sizing:border-box;margin:0;padding:0}body{display:flex;min-height:100vh;background:var(--bg);color:var(--ink);font-family:'Geist',sans-serif}.sidebar{width:240px;background:var(--bg2);border-right:1px solid var(--border);padding:20px 0;display:flex;flex-direction:column;position:fixed;height:100vh}.sidebar-brand{padding:0 20px 20px;display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--ink);font-weight:700;border-bottom:1px solid var(--border)}.mark{width:32px;height:32px;border-radius:8px;background:var(--accent);display:grid;place-items:center;color:#fff;font-family:'Instrument Serif',serif}.sidebar-nav{flex:1;padding:12px 8px}.sidebar-nav a{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r);color:var(--ink3);text-decoration:none;font-size:.88rem;margin-bottom:2px;transition:.15s}.sidebar-nav a:hover{background:var(--bg3);color:var(--ink)}.sidebar-nav a.active{background:var(--accent);color:#fff}.sidebar-nav a svg{width:18px;height:18px;flex-shrink:0}.main{margin-left:240px;flex:1;padding:32px}.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}.header h1{font-family:'Instrument Serif',serif;font-size:1.8rem;font-weight:400}.btn{padding:8px 16px;border-radius:var(--r);border:none;font:inherit;font-weight:600;font-size:.84rem;cursor:pointer}.btn-accent{background:var(--accent);color:#fff}.btn-sm{padding:5px 10px;font-size:.76rem}.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}.model-info h3{font-size:.95rem;margin-bottom:4px}.model-info p{font-size:.82rem;color:var(--ink3)}.badge{padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:600}.badge-free{background:rgba(34,197,94,.1);color:var(--green)}.badge-pro{background:rgba(200,75,9,.1);color:var(--accent)}.badge-on{background:rgba(34,197,94,.1);color:var(--green)}.badge-off{background:rgba(239,68,68,.1);color:var(--red)}.actions{display:flex;gap:6px;align-items:center}</style></head><body><aside class="sidebar"><a class="sidebar-brand" href="admin-dashboard.html"><span class="mark">T</span><span>Tribal AI Admin</span></a><nav class="sidebar-nav"><a href="admin-dashboard.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</a><a href="admin-users.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Users</a><a href="admin-chats.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Chats</a><a href="admin-payments.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>Payments</a><a href="admin-models.html" class="active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v6m0 6v6"/></svg>Models</a><a href="admin-analytics.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Analytics</a><a href="admin-settings.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/></svg>Settings</a><a href="admin-backups.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/></svg>Backups</a><a href="admin-logs.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg>Audit Logs</a><a href="admin-login.html" style="margin-top:auto"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Logout</a></nav></aside><div class="main"><div class="header"><h1>AI Models</h1><button class="btn btn-accent" onclick="loadModels()">↻ Refresh</button></div><div id="modelList"></div></div><script>const API='';const t=localStorage.getItem('ta_admin_token');if(!t)window.location='admin-login.html';async function loadModels(){try{const r=await fetch(API+'/api/admin/models',{headers:{'Authorization':'Bearer '+t}});if(!r.ok)return;const d=await r.json();const el=document.getElementById('modelList');el.innerHTML=(d.models||[]).map(m=>`<div class="card"><div class="model-info"><h3>${m.name}</h3><p>${m.provider} · <span class="badge badge-${m.tier}">${m.tier.toUpperCase()}</span></p></div><div class="actions"><span class="badge badge-${m.enabled?'on':'off'}">${m.enabled?'Enabled':'Disabled'}</span><button class="btn btn-sm btn-accent" onclick="toggleModel('${m.id}',${!m.enabled})">${m.enabled?'Disable':'Enable'}</button></div></div>`).join('')}catch{}}async function toggleModel(id,enabled){await fetch(API+`/api/admin/models/${id}`,{method:'PUT',headers:{'Content-Type':'application/json','Authorization':'Bearer '+t},body:JSON.stringify({enabled})});loadModels()}loadModels();</script></body></html>
