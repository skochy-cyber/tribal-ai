<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Tribal AI — Settings</title><link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet"><style>:root{--bg:#0f0e0b;--bg2:#1a1916;--bg3:#242320;--surface:#1e1d1a;--border:#2e2d29;--ink:#f9f8f6;--ink2:#d6d5d0;--ink3:#a8a49d;--ink4:#706d66;--accent:#c84b09;--green:#22c55e;--r:12px}*{box-sizing:border-box;margin:0;padding:0}body{display:flex;min-height:100vh;background:var(--bg);color:var(--ink);font-family:'Geist',sans-serif}.sidebar{width:240px;background:var(--bg2);border-right:1px solid var(--border);padding:20px 0;display:flex;flex-direction:column;position:fixed;height:100vh}.sidebar-brand{padding:0 20px 20px;display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--ink);font-weight:700;border-bottom:1px solid var(--border)}.mark{width:32px;height:32px;border-radius:8px;background:var(--accent);display:grid;place-items:center;color:#fff;font-family:'Instrument Serif',serif}.sidebar-nav{flex:1;padding:12px 8px}.sidebar-nav a{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r);color:var(--ink3);text-decoration:none;font-size:.88rem;margin-bottom:2px;transition:.15s}.sidebar-nav a:hover{background:var(--bg3);color:var(--ink)}.sidebar-nav a.active{background:var(--accent);color:#fff}.sidebar-nav a svg{width:18px;height:18px;flex-shrink:0}.main{margin-left:240px;flex:1;padding:32px}.header{margin-bottom:24px}.header h1{font-family:'Instrument Serif',serif;font-size:1.8rem;font-weight:400}.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:24px;margin-bottom:16px}.card h3{font-size:1rem;margin-bottom:16px}.fg{margin-bottom:16px}label{display:flex;align-items:center;gap:8px;font-size:.84rem;cursor:pointer}.label-text{font-weight:600;margin-left:4px}.toggle{position:relative;width:44px;height:24px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:.2s}.toggle.on{background:var(--accent);border-color:var(--accent)}.toggle::after{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;top:2px;left:2px;transition:.2s}.toggle.on::after{left:22px}.input{width:100%;padding:8px 12px;border:1.5px solid var(--border);border-radius:var(--r);background:var(--bg3);color:var(--ink);font:inherit;font-size:.88rem;outline:none}.input:focus{border-color:var(--accent)}.btn{padding:8px 16px;border-radius:var(--r);border:none;font:inherit;font-weight:600;font-size:.84rem;cursor:pointer}.btn-accent{background:var(--accent);color:#fff}.btn-accent:hover{background:#e85f1a}.toast{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--green);color:var(--green);padding:12px 20px;border-radius:var(--r);font-size:.88rem;display:none;z-index:1000}</style></head><body><aside class="sidebar"><a class="sidebar-brand" href="admin-dashboard.html"><span class="mark">T</span><span>Tribal AI Admin</span></a><nav class="sidebar-nav"><a href="admin-dashboard.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</a><a href="admin-users.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Users</a><a href="admin-chats.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Chats</a><a href="admin-payments.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>Payments</a><a href="admin-models.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/></svg>Models</a><a href="admin-analytics.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Analytics</a><a href="admin-settings.html" class="active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/></svg>Settings</a><a href="admin-backups.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/></svg>Backups</a><a href="admin-logs.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg>Audit Logs</a><a href="admin-login.html" style="margin-top:auto"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/></svg>Logout</a></nav></aside><div class="main"><div class="header"><h1>System Settings</h1></div><div class="card"><h3>General</h3><div class="fg"><label><div class="toggle" id="toggleMaint" onclick="toggleSetting('maintenanceMode')"></div><span class="label-text">Maintenance Mode</span></label><p style="font-size:.78rem;color:var(--ink4);margin-top:4px;margin-left:52px">Blocks all user access when enabled</p></div><div class="fg"><label><div class="toggle on" id="toggleSignup" onclick="toggleSetting('allowSignups')"></div><span class="label-text">Allow Signups</span></label></div><div class="fg"><label><div class="toggle on" id="toggleFree" onclick="toggleSetting('allowFreePlan')"></div><span class="label-text">Allow Free Plan</span></label></div></div><div class="card"><h3>Limits</h3><div class="fg"><label class="label-text" style="margin-bottom:6px;display:block">Pro Price (₦)</label><input class="input" id="proPrice" type="number" value="2500"></div><div class="fg"><label class="label-text" style="margin-bottom:6px;display:block">Free Message Limit</label><input class="input" id="freeLimit" type="number" value="50"></div><div class="fg"><label class="label-text" style="margin-bottom:6px;display:block">Max File Size (MB)</label><input class="input" id="maxFile" type="number" value="10"></div></div><div class="card"><h3>Announcement</h3><div class="fg"><textarea class="input" id="announcement" rows="3" placeholder="Set a site-wide announcement..."></textarea></div></div><button class="btn btn-accent" onclick="saveSettings()">Save Settings</button></div><div class="toast" id="toast">✅ Settings saved</div><script>const API='';const t=localStorage.getItem('ta_admin_token');if(!t)window.location='admin-login.html';let settings={};async function loadSettings(){try{const r=await fetch(API+'/api/admin/settings',{headers:{'Authorization':'Bearer '+t}});if(!r.ok)return;settings=await r.json();document.getElementById('toggleMaint').className='toggle '+(settings.maintenanceMode?'on':'');document.getElementById('toggleSignup').className='toggle '+(settings.allowSignups!==false?'on':'');document.getElementById('toggleFree').className='toggle '+(settings.allowFreePlan!==false?'on':'');document.getElementById('proPrice').value=settings.proPriceNaira||2500;document.getElementById('freeLimit').value=settings.freeMsgLimit||50;document.getElementById('maxFile').value=settings.maxFileSizeMB||10;document.getElementById('announcement').value=settings.announcement||''}catch{}}function toggleSetting(key){settings[key]=!settings[key];loadSettings()}async function saveSettings(){settings.proPriceNaira=parseInt(document.getElementById('proPrice').value);settings.freeMsgLimit=parseInt(document.getElementById('freeLimit').value);settings.maxFileSizeMB=parseInt(document.getElementById('maxFile').value);settings.announcement=document.getElementById('announcement').value;await fetch(API+'/api/admin/settings',{method:'PUT',headers:{'Content-Type':'application/json','Authorization':'Bearer '+t},body:JSON.stringify(settings)});const toast=document.getElementById('toast');toast.style.display='block';setTimeout(()=>toast.style.display='none',3000)}loadSettings();</script></body></html>
