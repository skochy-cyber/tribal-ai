<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#0f0e0b">
<title>Tribal AI — Page Not Found</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0e0b;--bg2:#1a1916;--bg3:#242320;--surface:#1e1d1a;--border:#2e2d29;--border2:#3d3c37;--ink:#f9f8f6;--ink2:#d6d5d0;--ink3:#a8a49d;--ink4:#706d66;--accent:#c84b09;--accent2:#e85f1a;--r:12px}
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:var(--bg);color:var(--ink);font-family:'Geist',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased;text-align:center;padding:40px 20px}
body::before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
.code{font-family:'Instrument Serif',serif;font-size:8rem;font-weight:400;color:var(--accent);line-height:1;margin-bottom:16px;opacity:.8}
h1{font-family:'Instrument Serif',serif;font-size:1.8rem;font-weight:400;margin-bottom:12px}
p{font-size:.95rem;color:var(--ink3);max-width:400px;margin:0 auto 32px;line-height:1.6}
.links{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:var(--r);font:inherit;font-weight:700;font-size:.88rem;cursor:pointer;text-decoration:none;transition:.2s;border:none}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2);transform:translateY(-2px)}
.btn-ghost{background:transparent;color:var(--ink3);border:1.5px solid var(--border2)}
.btn-ghost:hover{background:var(--bg3);color:var(--ink);border-color:var(--ink3)}
.footer{position:fixed;bottom:0;left:0;right:0;padding:18px 6%;background:var(--bg2);color:var(--ink4);font-size:.74rem;text-align:center;border-top:1px solid var(--border)}
</style>
</head>
<body>
  <div class="code">404</div>
  <h1>Page not found</h1>
  <p>The page you're looking for doesn't exist or has been moved.</p>
  <div class="links">
    <a class="btn btn-primary" href="/">← Back to Chat</a>
    <a class="btn btn-ghost" href="pricing.html">Pricing</a>
    <a class="btn btn-ghost" href="about.html">About</a>
  </div>
  <div class="footer">© 2026 Tribal AI · Built by Obasanjo Samuel · Tribal Tech</div>
</body>
</html>
