<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Tribal AI — Manage Users</title><link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet"><style>:root{--bg:#0f0e0b;--bg2:#1a1916;--bg3:#242320;--surface:#1e1d1a;--border:#2e2d29;--ink:#f9f8f6;--ink2:#d6d5d0;--ink3:#a8a49d;--ink4:#706d66;--accent:#c84b09;--green:#22c55e;--red:#ef4444;--r:12px}*{box-sizing:border-box;margin:0;padding:0}body{display:flex;min-height:100vh;background:var(--bg);color:var(--ink);font-family:'Geist',sans-serif}.sidebar{width:240px;background:var(--bg2);border-right:1px solid var(--border);padding:20px 0;display:flex;flex-direction:column;position:fixed;height:100vh}.sidebar-brand{padding:0 20px 20px;display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--ink);font-weight:700;border-bottom:1px solid var(--border)}.mark{width:32px;height:32px;border-radius:8px;background:var(--accent);display:grid;place-items:center;color:#fff;font-family:'Instrument Serif',serif}.sidebar-nav{flex:1;padding:12px 8px}.sidebar-nav a{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r);color:var(--ink3);text-decoration:none;font-size:.88rem;margin-bottom:2px;transition:.15s}.sidebar-nav a:hover{background:var(--bg3);color:var(--ink)}.sidebar-nav a.active{background:var(--accent);color:#fff}.sidebar-nav a svg{width:18px;height:18px;flex-shrink:0}.main{margin-left:240px;flex:1;padding:32px}.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}.header h1{font-family:'Instrument Serif',serif;font-size:1.8rem;font-weight:400}.btn{padding:8px 16px;border-radius:var(--r);border:none;font:inherit;font-weight:600;font-size:.84rem;cursor:pointer}.btn-accent{background:var(--accent);color:#fff}.btn-accent:hover{background:#e85f1a}.btn-sm{padding:5px 10px;font-size:.76rem}.btn-danger{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2)}.btn-danger:hover{background:rgba(239,68,68,.2)}.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:16px}.search{display:flex;gap:8px;margin-bottom:20px}.search input{flex:1;padding:8px 12px;border:1.5px solid var(--border);border-radius:var(--r);background:var(--bg3);color:var(--ink);font:inherit;font-size:.88rem;outline:none}.search input:focus{border-color:var(--accent)}table{width:100%;border-collapse:collapse}th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);font-size:.84rem}th{color:var(--ink4);font-weight:600;font-size:.76rem;text-transform:uppercase;letter-spacing:.04em}.badge{padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:600}.badge-free{background:rgba(34,197,94,.1);color:var(--green)}.badge-pro{background:rgba(200,75,9,.1);color:var(--accent)}.badge-admin{background:rgba(168,85,247,.1);color:#a855f7}.badge-banned{background:rgba(239,68,68,.1);color:var(--red)}.actions{display:flex;gap:4px}.empty{text-align:center;padding:40px;color:var(--ink4)}</style></head><body><aside class="sidebar"><a class="sidebar-brand" href="admin-dashboard.html"><span class="mark">T</span><span>Tribal AI Admin</span></a><nav class="sidebar-nav"><a href="admin-dashboard.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</a><a href="admin-users.html" class="active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Users</a><a href="admin-chats.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Chats</a><a href="admin-payments.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>Payments</a><a href="admin-models.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v6m0 6v6m-5.196-14.5L9.5 8.5m5 0 2.696-1.5M6.804 15.5L9.5 14m5 0 2.696 1.5"/></svg>Models</a><a href="admin-analytics.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Analytics</a><a href="admin-settings.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Settings</a><a href="admin-backups.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/></svg>Backups</a><a href="admin-logs.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Audit Logs</a><a href="admin-login.html" style="margin-top:auto"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Logout</a></nav></aside><div class="main"><div class="header"><h1>Manage Users</h1><button class="btn btn-accent" onclick="loadUsers()">↻ Refresh</button></div><div class="search"><input type="text" id="searchInput" placeholder="Search by name or email..." oninput="filterUsers(this.value)"></div><div class="card"><table><thead><tr><th>Name</th><th>Email</th><th>Plan</th><th>Joined</th><th>Actions</th></tr></thead><tbody id="userList"><tr><td colspan="5" class="empty">Loading...</td></tr></tbody></table></div></div><script>const API='';let allUsers=[];const t=localStorage.getItem('ta_admin_token');if(!t)window.location='admin-login.html';async function loadUsers(){try{const r=await fetch(API+'/api/admin/users',{headers:{'Authorization':'Bearer '+t}});if(!r.ok)return;const d=await r.json();allUsers=d.users||[];renderUsers(allUsers)}catch{}}function esc(t){return String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}function renderUsers(users){const el=document.getElementById('userList');if(!users.length){el.innerHTML='<tr><td colspan="5" class="empty">No users found</td></tr>';return}el.innerHTML=users.map(u=>`<tr><td><strong>${esc(u.name)||'User'}</strong></td><td>${u.email}</td><td><span class="badge badge-${u.plan||'free'}">${(u.plan||'free').toUpperCase()}</span></td><td>${new Date(u.createdAt).toLocaleDateString()}</td><td><div class="actions"><button class="btn btn-sm btn-accent" onclick="changePlan('${u.id}','${u.plan}')">Toggle Plan</button><button class="btn btn-sm btn-danger" onclick="deleteUser('${u.id}')">Delete</button></div></td></tr>`).join('')}function filterUsers(q){renderUsers(allUsers.filter(u=>(u.name||'').toLowerCase().includes(q.toLowerCase())||u.email.toLowerCase().includes(q.toLowerCase())))}async function changePlan(id,current){const plan=current==='free'?'pro':'free';await fetch(API+`/api/admin/users/${id}/plan`,{method:'PUT',headers:{'Content-Type':'application/json','Authorization':'Bearer '+t},body:JSON.stringify({plan})});loadUsers()}async function deleteUser(id){if(!confirm('Delete this user?'))return;await fetch(API+`/api/admin/users/${id}`,{method:'DELETE',headers:{'Authorization':'Bearer '+t}});loadUsers()}loadUsers();</script></body></html>
