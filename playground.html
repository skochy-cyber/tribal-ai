<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Tribal AI — Playground</title><link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"><script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script><style>:root{--bg:#0f0e0b;--bg2:#1a1916;--bg3:#242320;--surface:#1e1d1a;--border:#2e2d29;--ink:#f9f8f6;--ink2:#d6d5d0;--ink3:#a8a49d;--ink4:#706d66;--accent:#c84b09;--r:12px}*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--ink);font-family:'Geist',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column}nav{height:56px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 6%;gap:12px;flex-shrink:0}.brand{display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--ink);font-weight:700;font-size:.88rem}.mark{width:28px;height:28px;border-radius:6px;background:var(--accent);display:grid;place-items:center;color:#fff;font-family:'Instrument Serif',serif;font-size:.8rem}.watermark{margin-left:auto;font-size:.72rem;color:var(--ink4);background:var(--bg3);padding:4px 10px;border-radius:8px}.chat-area{flex:1;overflow-y:auto;display:flex;flex-direction:column}.messages{max-width:700px;width:100%;margin:0 auto;padding:24px 20px;flex:1;display:flex;flex-direction:column;gap:20px}.msg{display:flex;gap:10px}.msg-user{justify-content:flex-end}.avatar{width:28px;height:28px;border-radius:6px;display:grid;place-items:center;font-size:.65rem;font-weight:700;flex-shrink:0}.msg-user .avatar{background:var(--accent);color:#fff}.msg-ai .avatar{background:var(--bg3);color:var(--ink2);border:1px solid var(--border)}.content{max-width:85%;font-size:.88rem;line-height:1.65;color:var(--ink2)}.msg-user .content{background:var(--bg3);border:1px solid var(--border);border-radius:14px 14px 4px 14px;padding:10px 14px}.msg-ai .content{color:var(--ink)}.content p{margin-bottom:6px}pre{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;overflow-x:auto;margin:10px 0;font-family:'JetBrains Mono',monospace;font-size:.8rem}pre code{background:transparent;padding:0}code{font-family:'JetBrains Mono',monospace;font-size:.84em;background:var(--bg3);padding:2px 5px;border-radius:4px}.typing span{width:5px;height:5px;border-radius:50%;background:var(--ink4);display:inline-block;animation:b 1.4s infinite}.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}@keyframes b{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}.input-area{padding:12px 20px 20px;border-top:1px solid var(--border)}.input-wrap{max-width:700px;margin:0 auto;display:flex;gap:8px}.input-box{flex:1;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--r);background:var(--surface);color:var(--ink);font:inherit;font-size:.88rem;outline:none;resize:none;max-height:120px}.input-box:focus{border-color:var(--accent)}.send-btn{width:40px;height:40px;border-radius:var(--r);background:var(--accent);border:none;color:#fff;cursor:pointer;display:grid;place-items:center;opacity:.5;transition:.15s}.send-btn.active{opacity:1}.send-btn:hover{background:#e85f1a}.footer{text-align:center;font-size:.72rem;color:var(--ink4);padding:8px}.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px}.welcome h1{font-family:'Instrument Serif',serif;font-size:2rem;margin-bottom:8px}em{color:var(--accent);font-style:italic}.welcome p{color:var(--ink3);margin-bottom:24px}.prompts{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}.prompt{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:8px 14px;font:inherit;font-size:.8rem;color:var(--ink3);cursor:pointer}.prompt:hover{background:var(--bg3);color:var(--ink)}</style></head><body><nav><a class="brand" href="/"><span class="mark">T</span><span>Tribal AI</span></a><a class="watermark" href="signup.html">Sign up for full access →</a></nav><div class="chat-area"><div class="welcome" id="welcome"><h1>Try <em>Tribal AI</em> free</h1><p>No account needed. Limited to 5 messages.</p><div class="prompts"><div class="prompt" onclick="qp('Write a Python function to sort a list')">🐍 Sort a list</div><div class="prompt" onclick="qp('Explain quantum computing simply')">💡 Quantum computing</div><div class="prompt" onclick="qp('Write a professional email')">✉️ Write email</div><div class="prompt" onclick="qp('Debug this code: print(1/0)')">🐛 Debug code</div></div></div><div class="messages" id="msgs" style="display:none"></div></div><div class="input-area"><div class="input-wrap"><textarea class="input-box" id="input" placeholder="Message Tribal AI…" rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}" oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px';document.getElementById('send').classList.toggle('active',this.value.trim().length>0)"></textarea><button class="send-btn" id="send" onclick="send()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg></button></div><div class="footer">Tribal AI can make mistakes. <a href="signup.html" style="color:var(--accent)">Sign up</a> for full access.</div></div><script>marked.setOptions({highlight:(c,l)=>l&&hljs.getLanguage(l)?hljs.highlight(c,{language:l}).value:hljs.highlightAuto(c).value,breaks:true,gfm:true});let count=0;const MAX=5;function qp(t){document.getElementById('input').value=t;send()}async function send(){const input=document.getElementById('input');const msg=input.value.trim();if(!msg||count>=MAX)return;input.value='';input.style.height='auto';document.getElementById('send').classList.remove('active');document.getElementById('welcome').style.display='none';const m=document.getElementById('msgs');m.style.display='flex';appendMsg('user',msg);showTyping();count++;try{const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg})});const d=await r.json();hideTyping();appendMsg('assistant',d.response||d.error||'No response');if(count>=MAX)appendMsg('assistant','⚠️ **Demo limit reached.** [Sign up](signup.html) for unlimited messages.');}catch{hideTyping();appendMsg('assistant','Network error. Try again.');}m.scrollTop=m.scrollHeight}function appendMsg(role,content){const m=document.getElementById('msgs');const d=document.createElement('div');d.className='msg msg-'+(role==='user'?'user':'ai');d.innerHTML=`<div class="avatar">${role==='user'?'Y':'T'}</div><div class="content">${role==='assistant'?marked.parse(content):content.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}</div>`;m.appendChild(d)}function showTyping(){const m=document.getElementById('msgs');const d=document.createElement('div');d.className='msg msg-ai';d.id='typing';d.innerHTML='<div class="avatar">T</div><div class="content"><div class="typing"><span></span><span></span><span></span></div></div>';m.appendChild(d);m.scrollTop=m.scrollHeight}function hideTyping(){const e=document.getElementById('typing');if(e)e.remove()}</script></body></html>
