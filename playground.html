<nav><a class="brand" href="/"><span class="mark">T</span><span>Tribal AI</span></a><a class="watermark" href="signup.html">Sign up for full access →</a></nav><div class="chat-area"><div class="welcome" id="welcome"><h1>Try <em>Tribal AI</em> free</h1><p>No account needed. Limited to 5 messages.</p><div class="prompts"><div class="prompt" onclick="qp('Write a Python function to sort a list')"><svg width="16" height="16" style="display:inline-block;vertical-align:middle"><use href="#icon-zap"/></svg> Sort a list</div><div class="prompt" onclick="qp('Explain quantum computing simply')"><svg width="16" height="16" style="display:inline-block;vertical-align:middle"><use href="#icon-zap"/></svg> Quantum computing</div><div class="prompt" onclick="qp('Write a professional email')"><svg width="16" height="16" style="display:inline-block;vertical-align:middle"><use href="#icon-mail"/></svg> Write email</div><div class="prompt" onclick="qp('Debug this code: print(1/0)')"><svg width="16" height="16" style="display:inline-block;vertical-align:middle"><use href="#icon-alert"/></svg> Debug code</div></div></div><div class="messages" id="msgs" style="display:none"></div></div><div class="input-area"><div class="input-wrap"><textarea class="input-box" id="input" placeholder="Message Tribal AI…" rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}" oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px';document.getElementById('send').classList.toggle('active',this.value.trim().length>0)"></textarea><button class="send-btn" id="send" onclick="send()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg></button></div><div class="footer">Tribal AI can make mistakes. <a href="signup.html" style="color:var(--accent)">Sign up</a> for full access.</div></div><script>marked.setOptions({highlight:(c,l)=>l&&hljs.getLanguage(l)?hljs.highlight(c,{language:l}).value:hljs.highlightAuto(c).value,breaks:true,gfm:true});let count=0;const MAX=5;function qp(t){document.getElementById('input').value=t;send()}async function send(){const input=document.getElementById('input');const msg=input.value.trim();if(!msg||count>=MAX)return;input.value='';input.style.height='auto';document.getElementById('send').classList.remove('active');document.getElementById('welcome').style.display='none';const m=document.getElementById('msgs');m.style.display='flex';appendMsg('user',msg);showTyping();count++;try{const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg})});const d=await r.json();hideTyping();appendMsg('assistant',d.response||d.error||'No response');if(count>=MAX)appendMsg('assistant','icon('alert') **Demo limit reached.** [Sign up](signup.html) for unlimited messages.');}catch{hideTyping();appendMsg('assistant','Network error. Try again.');}m.scrollTop=m.scrollHeight}function appendMsg(role,content){const m=document.getElementById('msgs');const d=document.createElement('div');d.className='msg msg-'+(role==='user'?'user':'ai');d.innerHTML=`<div class="avatar">${role==='user'?'Y':'T'}</div><div class="content">${role==='assistant'?marked.parse(content):content.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}</div>`;m.appendChild(d)}function showTyping(){const m=document.getElementById('msgs');const d=document.createElement('div');d.className='msg msg-ai';d.id='typing';d.innerHTML='<div class="avatar">T</div><div class="content"><div class="typing"><span></span><span></span><span></span></div></div>';m.appendChild(d);m.scrollTop=m.scrollHeight}function hideTyping(){const e=document.getElementById('typing');if(e)e.remove()}</script></body></html>
